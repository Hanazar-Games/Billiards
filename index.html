<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Billiards v1.0.0</title>
  <style>
    :root {
      --felt: #106442;
      --felt-bright: #18a46a;
      --ink: #090b0d;
      --panel: rgba(12, 15, 18, 0.72);
      --panel-strong: rgba(14, 17, 21, 0.88);
      --line: rgba(255,255,255,0.16);
      --line-strong: rgba(255,255,255,0.28);
      --text: #f4f7f4;
      --muted: rgba(244,247,244,0.64);
      --gold: #d8b15f;
      --red: #b9123f;
      --blue: #1877c9;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0d0e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    canvas { display: block; }
    #ui-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      padding: 18px 24px;
      user-select: none;
    }
    #top-bar {
      position: relative;
      display: grid;
      grid-template-columns: minmax(110px, 150px) minmax(260px, 1fr) minmax(110px, 150px);
      align-items: start;
      gap: 18px;
      width: 100%;
    }
    #power-bar-container {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      width: min(420px, 42vw);
      height: 18px;
      background: rgba(8,10,12,0.62);
      border: 1px solid rgba(255,255,255,0.42);
      border-radius: 999px;
      overflow: hidden;
      pointer-events: none;
      box-shadow: inset 0 1px 8px rgba(0,0,0,0.75), 0 10px 28px rgba(0,0,0,0.35);
      display: none;
    }
    #power-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #27f59a 0%, #f7df4d 54%, #ff3d57 100%);
      box-shadow: 0 0 14px rgba(255,255,255,0.2);
    }
    #message {
      text-align: center;
      justify-self: center;
      max-width: 640px;
      min-height: 42px;
      padding: 10px 18px;
      font-size: 16px;
      font-weight: 650;
      color: var(--text);
      line-height: 1.32;
      letter-spacing: 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.75);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
      animation: uiFloatIn 420ms var(--ease) both;
    }
    .player-badge {
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 750;
      font-size: 14px;
      color: var(--text);
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      text-align: center;
      transition: all 0.3s ease;
      min-width: 118px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      animation: uiFloatIn 420ms var(--ease) both;
    }
    #player1 { background: linear-gradient(135deg, rgba(194, 16, 63, 0.86), rgba(128, 11, 42, 0.82)); }
    #player2 { background: linear-gradient(135deg, rgba(33, 136, 222, 0.86), rgba(18, 83, 154, 0.82)); }
    .player-badge.active {
      border-color: rgba(255,255,255,0.9);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 0 22px rgba(255,255,255,0.22), 0 12px 32px rgba(0,0,0,0.32);
      transform: translateY(-1px);
    }
    #version-tag {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
    }
    #menu-layer {
      position: absolute; inset: 0;
      z-index: 20; pointer-events: auto;
      background:
        linear-gradient(135deg, rgba(16,100,66,0.34) 0%, rgba(9,11,13,0.0) 34%),
        linear-gradient(25deg, rgba(122,26,38,0.22) 0%, rgba(9,11,13,0.0) 36%),
        linear-gradient(180deg, #101412 0%, #07090a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #menu-layer::before {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent 78%);
      pointer-events: none;
    }
    .menu-title {
      font-size: clamp(40px, 6vw, 68px); font-weight: 900;
      color: var(--text); letter-spacing: 4px;
      text-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 34px rgba(24,164,106,0.22);
      margin-bottom: 12px;
      animation: titleFloat 3s ease-in-out infinite;
    }
    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .menu-btn {
      width: min(380px, calc(100vw - 48px)); padding: 16px 18px;
      background: rgba(12,15,18,0.68);
      border: 1px solid var(--line);
      border-radius: 8px;
      backdrop-filter: blur(14px);
      cursor: pointer; transition: transform 180ms var(--ease), background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      text-align: left; pointer-events: auto;
      display: flex; flex-direction: column; gap: 4px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.24);
      position: relative;
      overflow: hidden;
    }
    .menu-btn:hover {
      background: rgba(20,26,30,0.86);
      border-color: rgba(216,177,95,0.48);
      transform: translateY(-2px);
      box-shadow: 0 18px 46px rgba(0,0,0,0.34), inset 3px 0 0 rgba(216,177,95,0.74);
    }
    .menu-btn:active { transform: translateY(0); }
    .menu-btn-title {
      font-size: 17px;
      font-weight: 780;
      color: var(--text);
      letter-spacing: 0;
    }
    .menu-btn-desc {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0;
    }
    .panel-surface {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.44);
      backdrop-filter: blur(18px);
    }
    .ui-action {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      transition: transform 160ms var(--ease), background 160ms ease, border-color 160ms ease;
    }
    .ui-action:hover {
      background: rgba(255,255,255,0.14);
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }
    #ui-layer { display: none; }
    @keyframes uiFloatIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (max-width: 760px) {
      #ui-layer { padding: 12px; }
      #top-bar {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      #message {
        grid-column: 1 / -1;
        grid-row: 2;
        font-size: 13px;
        padding: 8px 10px;
        max-width: none;
      }
      .player-badge {
        min-width: 0;
        font-size: 13px;
      }
      #power-bar-container {
        width: calc(100vw - 96px);
      }
    }

    /* JS-error diagnostic overlay */
    #js-error-overlay {
      position: fixed; inset: 0;
      z-index: 99999;
      background: rgba(0,0,0,0.92);
      color: #ff5252;
      padding: 40px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      white-space: pre-wrap;
      overflow: auto;
      display: none;
    }
    #js-error-overlay.visible { display: block; }
    #js-error-overlay h2 { color: #fff; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="menu-layer"></div>
  <div id="ui-layer">
    <div id="top-bar">
      <div id="player1" class="player-badge active">Player 1</div>
      <div id="message">Aim with mouse, hold LEFT CLICK to charge, release to shoot.<br>Hold SHIFT and drag to rotate camera. Wheel to zoom.</div>
      <div id="player2" class="player-badge">Player 2</div>
    </div>
    <div id="power-bar-container">
      <div id="power-bar-fill"></div>
    </div>
    <div id="version-tag">v0.12.0</div>
  </div>

  <!-- Diagnostic overlay for JS errors -->
  <div id="js-error-overlay">
    <h2>⚠️ JavaScript Error</h2>
    <div id="js-error-content"></div>
  </div>

  <script>
    // Catch errors that happen before or outside the module script
    window.addEventListener('error', function(e) {
      var overlay = document.getElementById('js-error-overlay');
      var content = document.getElementById('js-error-content');
      if (overlay && content) {
        content.textContent = (content.textContent ? content.textContent + '\n---\n' : '') +
          'Error: ' + e.message + '\n' +
          'Source: ' + (e.filename || e.target.src || 'unknown') + '\n' +
          'Line: ' + (e.lineno || 'N/A') + ':' + (e.colno || 'N/A');
        overlay.classList.add('visible');
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      var overlay = document.getElementById('js-error-overlay');
      var content = document.getElementById('js-error-content');
      if (overlay && content) {
        content.textContent = (content.textContent ? content.textContent + '\n---\n' : '') +
          'Unhandled Promise Rejection:\n' + e.reason;
        overlay.classList.add('visible');
      }
    });
  </script>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
